# Required: Tencent Cloud credentials
# Get from https://console.cloud.tencent.com/cam/capi
secret_id: "your-secret-id"
secret_key: "your-secret-key"

# Optional: default region (can be overridden per query)
default_region: "ap-nanjing"

# Known topics: only identity (topic_id + region)
# Topic knowledge (fields, conventions, query patterns) lives in knowledge/{topic_name}/
# See knowledge/CLAUDE.md for the authoring guide
known_topics:
  my_app:
    topic_id: "your-topic-id-here"
    region: "ap-nanjing"

# Optional: override the knowledge directory (absolute path). Defaults to
# {plugin_root}/knowledge. Useful for deployments that want knowledge files
# isolated from the plugin source tree (e.g. /var/lib/zhiliao/knowledge/cls-query).
# knowledge_dir: "/absolute/path/to/knowledge"
